# 本地开发用，覆盖 docker-compose.yml 中需要修改的部分
# 用法：
#   podman-compose -f docker-compose.yml -f docker-compose.local.yml build
#   podman-compose -f docker-compose.yml -f docker-compose.local.yml up -d

version: "3.9"

services:
  backend:
    environment:
      - HTTPS_PROXY=
      - HTTP_PROXY=
      - NO_PROXY=

  leafwriter:
    build:
      context: ./leafwriter
      dockerfile: Dockerfile
      args:
        - ROUTER_BASE=/
    environment:
      - AUTH_API_URL=http://backend:8091
      - KEYCLOAK_URL=
